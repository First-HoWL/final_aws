services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: userdb
      POSTGRES_PASSWORD: qwerty12345
      POSTGRES_DB: userdb
    ports:
      - "5432:5432"
    volumes:
      - ./db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U userdb -d userdb"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
  server:
    build: ./backend
    working_dir: /app
    volumes:
    - ./backend:/app
    container_name: django_app
    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py runserver 0.0.0.0:8000
      "
    ports:
      - "8000:8000"
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: userdb
      POSTGRES_PASSWORD: qwerty12345
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
  frontend:
    build: ./frontend
    ports:
      - 80:80